# Structured Logging Configuration for Phase 1

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  json:
    format: '{"time": "%(asctime)s", "name": "%(name)s", "level": "%(levelname)s", "message": "%(message)s", "module": "%(module)s", "function": "%(funcName)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"
  
  detailed:
    format: "%(asctime)s - %(name)s - [%(levelname)s] - %(module)s.%(funcName)s:%(lineno)d - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/errors.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
  
  audit_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/audit.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf8

loggers:
  # Application loggers
  app:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  app.api:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  app.services:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  app.services.ai:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  # Audit logger
  app.audit:
    level: INFO
    handlers: [audit_file]
    propagate: false
  
  # Third-party loggers
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false
  
  uvicorn.access:
    level: WARNING
    handlers: [console]
    propagate: false
  
  sqlalchemy:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]

# Monitoring integration (Better Stack / Sentry)
monitoring:
  better_stack:
    enabled: ${BETTER_STACK_ENABLED:-false}
    source_token: ${BETTER_STACK_TOKEN}
  
  sentry:
    enabled: ${SENTRY_ENABLED:-false}
    dsn: ${SENTRY_DSN}
    environment: ${ENVIRONMENT:-development}
    traces_sample_rate: 0.1

